{% extends 'hospital_app/base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-header bg-warning text-dark">
        <h3>✏️ Edit Patient</h3>
    </div>

    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Patient Name</label>
                <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select">
                    <option value="Male" {% if patient.gender == "Male" %}selected{% endif %}>Male</option>
                    <option value="Female" {% if patient.gender == "Female" %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" value="{{ patient.phone }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Problem</label>
                <textarea name="problem" class="form-control" required>{{ patient.problem }}</textarea>
            </div>

            <button type="submit" class="btn btn-warning">
                Update Patient
            </button>

            <a href="/patients/" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
